name: 15-Min Backup with Commit Hash

on:
  schedule:
    - cron: '*/15 * * * *' 
  workflow_dispatch: 

jobs:
  check_and_backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Note: The "Sync Fork" step has been completely removed!

      - name: Get Latest Release Info & Hash
        id: get_info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          INFO=$(gh release list --repo smartcmd/MinecraftConsoles --limit 1 --json tagName,publishedAt --jq '.[0] | "\(.tagName)@\(.publishedAt)"')
          TAG=$(echo "$INFO" | cut -d'@' -f1)
          HASH=$(gh api repos/smartcmd/MinecraftConsoles/commits/$TAG --jq '.sha' | cut -c1-7)
          
          INFO_WITH_HASH="${INFO}@${HASH}"
          echo "info=$INFO_WITH_HASH" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "hash=$HASH" >> $GITHUB_OUTPUT
          echo "Latest release found: $INFO_WITH_HASH"

      - name: Check if Version is New
        id: check
        run: |
          if [ -f .last_backup_info ] && [ "$(cat .last_backup_info)" == "${{ steps.get_info.outputs.info }}" ]; then
            echo "match=true" >> $GITHUB_OUTPUT
            echo "No changes since last check. Skipping."
          else
            echo "match=false" >> $GITHUB_OUTPUT
            echo "New update detected! Starting backup..."
          fi

      - name: Backup to Google Drive
        if: steps.check.outputs.match == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TIMESTAMP=$(date +'%Y-%m-%d_%H-%M')
          
          sudo apt-get install -y rclone
          mkdir -p ~/.config/rclone
          cat << EOF > ~/.config/rclone/rclone.conf
          ${{ secrets.RCLONE_CONF }}
          EOF
          
          TAG="${{ steps.get_info.outputs.tag }}"
          HASH="${{ steps.get_info.outputs.hash }}"
          SAFE_TAG=$(echo "$TAG" | tr -cd '[:alnum:]._-')
          
          gh release download "$TAG" --repo smartcmd/MinecraftConsoles --dir ./backup_files --pattern '*'
          gh release download "$TAG" --repo smartcmd/MinecraftConsoles --dir ./backup_files --archive zip
          
          FOLDER_NAME="Backup_${TIMESTAMP}_${SAFE_TAG}_${HASH}"
          rclone copy ./backup_files "gdrive:$FOLDER_NAME" --drive-root-folder-id ${{ secrets.DRIVE_FOLDER_ID }} -vv
          
          echo "${{ steps.get_info.outputs.info }}" > .last_backup_info
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add .last_backup_info
          git commit -m "Update last backup info: ${{ steps.get_info.outputs.info }}"
          
          # Added --autostash to make this pull 100% crash-proof against workspace files
          git pull --rebase --autostash origin main
          git push
