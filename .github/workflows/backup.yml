name: Smart Hourly Nightly Backup

on:
  schedule:
    - cron: '17 * * * *' 
  workflow_dispatch: 

jobs:
  check_and_backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync Fork
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh repo sync ${{ github.repository }} --source smartcmd/MinecraftConsoles

      - name: Get Latest Release Tag
        id: get_tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # We ask for a list of all releases (including pre-releases) and grab the newest one at the top
          TAG=$(gh release list --repo smartcmd/MinecraftConsoles --limit 1 --json tagName --jq '.[0].tagName')
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Latest release found is: $TAG"

      - name: Check if Version is New
        id: check
        run: |
          if [ -f .last_backup_tag ] && [ "$(cat .last_backup_tag)" == "${{ steps.get_tag.outputs.tag }}" ]; then
            echo "match=true" >> $GITHUB_OUTPUT
            echo "No new version detected. Skipping backup."
          else
            echo "match=false" >> $GITHUB_OUTPUT
            echo "New version detected or first run! Starting backup..."
          fi

      - name: Backup to Google Drive
        if: steps.check.outputs.match == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TIMESTAMP=$(date +'%Y-%m-%d_%H-%M')
          
          # Install & Config Rclone
          sudo apt-get install -y rclone
          mkdir -p ~/.config/rclone
          cat << EOF > ~/.config/rclone/rclone.conf
          ${{ secrets.RCLONE_CONF }}
          EOF
          
          # Download using the EXACT tag we found in the earlier step instead of the word 'latest'
          gh release download "${{ steps.get_tag.outputs.tag }}" --repo smartcmd/MinecraftConsoles --dir ./backup_files --pattern '*' --archive zip
          
          # Upload to Drive
          rclone copy ./backup_files gdrive: --drive-root-folder-id ${{ secrets.DRIVE_FOLDER_ID }} --path-override "Nightly_$TIMESTAMP" -vv
          
          # Save this tag so we don't repeat the backup next hour
          echo "${{ steps.get_tag.outputs.tag }}" > .last_backup_tag
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add .last_backup_tag
          git commit -m "Update last backup tag to ${{ steps.get_tag.outputs.tag }}"
          git push
