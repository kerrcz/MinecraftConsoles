name: Smart Hourly Nightly Backup

on:
  schedule:
    - cron: '17 * * * *' 
  workflow_dispatch: 

jobs:
  check_and_backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync Fork
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh repo sync ${{ github.repository }} --source smartcmd/MinecraftConsoles

      - name: Get Latest Release Info
        id: get_info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          INFO=$(gh release list --repo smartcmd/MinecraftConsoles --limit 1 --json tagName,publishedAt --jq '.[0] | "\(.tagName)@\(.publishedAt)"')
          echo "info=$INFO" >> $GITHUB_OUTPUT
          echo "Latest release info: $INFO"

      - name: Check if Version or Date is New
        id: check
        run: |
          if [ -f .last_backup_info ] && [ "$(cat .last_backup_info)" == "${{ steps.get_info.outputs.info }}" ]; then
            echo "match=true" >> $GITHUB_OUTPUT
            echo "No changes in tag or date. Skipping."
          else
            echo "match=false" >> $GITHUB_OUTPUT
            echo "New update detected! Starting backup..."
          fi

      - name: Backup to Google Drive
        if: steps.check.outputs.match == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TIMESTAMP=$(date +'%Y-%m-%d_%H-%M')
          sudo apt-get install -y rclone
          mkdir -p ~/.config/rclone
          
          # [THE FIX IS HERE] Safely writing the multi-line config
          cat << EOF > ~/.config/rclone/rclone.conf
          ${{ secrets.RCLONE_CONF }}
          EOF
          
          TAG=$(echo "${{ steps.get_info.outputs.info }}" | cut -d'@' -f1)
          gh release download "$TAG" --repo smartcmd/MinecraftConsoles --dir ./backup_files --pattern '*'
          gh release download "$TAG" --repo smartcmd/MinecraftConsoles --dir ./backup_files --archive zip
          
          rclone copy ./backup_files "gdrive:Nightly_$TIMESTAMP" --drive-root-folder-id ${{ secrets.DRIVE_FOLDER_ID }} -vv
          
          echo "${{ steps.get_info.outputs.info }}" > .last_backup_info
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add .last_backup_info
          git commit -m "Update last backup info: ${{ steps.get_info.outputs.info }}"
          git push
